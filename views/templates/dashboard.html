<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <style>
        body { font-family: Arial; max-width: 600px; margin: 50px auto; padding: 20px; }
        .header { background: #f8f9fa; padding: 20px; border-radius: 5px; margin-bottom: 20px; }
        .logout-btn { background: #dc3545; color: white; padding: 10px 20px; text-decoration: none; border-radius: 4px; display: inline-block; margin-top: 20px; }
        .flash { padding: 10px; margin: 10px 0; border-radius: 4px; }
        .success { background: #d4edda; color: #155724; }
        .info { background: #d1ecf1; color: #0c5460; }
        .menu-btn { padding: 10px 20px; color: white; border: none; border-radius: 4px; cursor: pointer; margin-right: 10px; }
    </style>
</head>
<body>
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="flash {{ category }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}
    
    <div class="header">
        <h2>📊 Dashboard</h2>
        <p>Bem-vindo, <strong>{{ email }}</strong>!</p>
    </div>
    
    <p>Esta é uma área protegida do sistema.</p>
    
    <a href="{{ url_for('auth.lista_usuarios') }}">
        <button class="menu-btn" style="background: #17a2b8;">📋 Ver Usuários</button>
    </a>
    
    <div style="margin-top: 20px;">
        <a href="{{ url_for('auth.logout') }}" class="logout-btn">
            🚪 Sair do Sistema
        </a>
    </div>
</body>
</html>
