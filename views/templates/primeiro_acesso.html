<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Primeiro Acesso</title>
    <style>
        body { font-family: Arial; max-width: 400px; margin: 100px auto; }
        .flash { padding: 10px; margin: 10px 0; border-radius: 4px; }
        .error { background: #f8d7da; color: #721c24; }
        .success { background: #d4edda; color: #155724; }
        input { width: 100%; padding: 10px; margin: 5px 0; }
        button { width: 100%; padding: 10px; background: #28a745; color: white; border: none; }
    </style>
</head>
<body>
    <h2>🔐 Alterar Senha</h2>
    <p>Este é seu primeiro acesso. Defina uma nova senha.</p>
    
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="flash {{ category }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}
    
    <form method="POST">
        <input type="password" name="nova_senha" placeholder="Nova Senha (mín. 6 caracteres)" required minlength="6">
        <input type="password" name="confirmar_senha" placeholder="Confirmar Nova Senha" required>
        <button type="submit">Alterar Senha</button>
    </form>
</body>
</html>
